<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity Clash: Chaos Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface2:#1a1a2e;--border:#2a2a3e;--text:#e0e0e8;--dim:#6a6a8a;--red:#ff4455;--orange:#ff8844;--yellow:#ffcc33;--green:#44dd66;--cyan:#44ddff;--blue:#4488ff;--purple:#aa66ff;--pink:#ff66aa}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
.game-container{max-width:800px;margin:0 auto;padding:12px}
 
/* Title */
.title{text-align:center;padding:20px 0}
.title h1{font-size:2.8em;font-weight:900;background:linear-gradient(135deg,var(--red),var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;line-height:1.1}
.title .sub{color:var(--dim);font-size:1.1em;margin-top:4px;letter-spacing:6px;text-transform:uppercase}
.title .tagline{color:var(--dim);font-size:0.8em;margin-top:8px;font-style:italic}
 
/* Character Select */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:12px 0}
.char-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.char-card:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 8px 24px rgba(170,102,255,.15)}
.char-card .char-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.char-card .char-emoji{font-size:2.2em}
.char-card .char-name{font-weight:800;font-size:1.1em}
.char-card .char-desc{font-size:.72em;color:var(--dim);font-style:italic;margin-bottom:12px;line-height:1.4}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:.75em;font-family:'Courier New',monospace}
.stat-row{display:flex;justify-content:space-between}
.stat-label{color:var(--dim)}
.stat-hp{color:var(--green)}.stat-dmg{color:var(--red)}.stat-def{color:var(--blue)}.stat-acc{color:var(--yellow)}.stat-eva{color:var(--purple)}.stat-spd{color:var(--cyan)}
.char-moves{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.char-moves span{font-size:.62em;background:var(--surface2);color:var(--dim);padding:2px 6px;border-radius:4px}
 
/* Battle Screen */
.battle-header{text-align:center;margin-bottom:8px}
.battle-header h1{font-size:1.6em;font-weight:900;background:linear-gradient(135deg,var(--red),var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.turn-indicator{color:var(--dim);font-size:.8em;font-family:monospace}
 
/* Health Bars */
.hp-section{margin:6px 0}
.hp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:.82em}
.hp-name{font-weight:700;display:flex;align-items:center;gap:6px}
.hp-numbers{font-family:monospace;color:var(--dim);font-size:.85em}
.hp-bar-outer{height:18px;background:var(--surface2);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.hp-bar-inner{height:100%;border-radius:9px;transition:width .6s ease}
.hp-green{background:linear-gradient(90deg,#22aa44,#44dd66)}.hp-yellow{background:linear-gradient(90deg,#cc8800,#ffcc33)}.hp-red{background:linear-gradient(90deg,#cc2233,#ff4455)}
.hp-bar-enemy .hp-bar-inner{direction:rtl}
 
/* Meters */
.meters{display:flex;gap:12px;margin:8px 0}
.meter{flex:1}
.meter-header{display:flex;justify-content:space-between;font-size:.72em;font-weight:700;margin-bottom:2px}
.meter-chaos .meter-header{color:var(--orange)}.meter-clarity .meter-header{color:var(--cyan)}
.meter-bar{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.meter-fill-chaos{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:5px;transition:width .5s}
.meter-fill-clarity{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:5px;transition:width .5s}
.meter-label{font-size:.6em;color:var(--dim);text-align:center;margin-top:2px;font-style:italic}
 
/* Status Effects */
.status-effects{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0;min-height:20px}
.status-pill{font-size:.6em;padding:2px 7px;border-radius:8px;font-weight:600;animation:fadeInPill .3s}
@keyframes fadeInPill{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.status-buff{background:rgba(68,221,102,.15);color:var(--green);border:1px solid rgba(68,221,102,.3)}
.status-debuff{background:rgba(255,68,85,.15);color:var(--red);border:1px solid rgba(255,68,85,.3)}
.status-neutral{background:rgba(170,102,255,.15);color:var(--purple);border:1px solid rgba(170,102,255,.3)}
 
/* Battle Log */
.log-container{background:var(--surface);border:1px solid var(--border);border-radius:10px;height:240px;overflow-y:auto;padding:10px;margin:8px 0;scroll-behavior:smooth}
.log-container::-webkit-scrollbar{width:6px}.log-container::-webkit-scrollbar-track{background:var(--surface)}.log-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log-entry{font-family:'Courier New',monospace;font-size:.72em;line-height:1.6;animation:logSlide .3s ease}
@keyframes logSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.log-move{color:var(--yellow)}.log-damage{color:var(--red)}.log-miss{color:var(--dim)}.log-event{color:var(--purple)}.log-commentary{color:var(--dim);font-style:italic}.log-system{color:var(--cyan);font-weight:700}.log-heal{color:var(--green)}.log-status{color:var(--pink)}.log-turn-sep{color:var(--border);user-select:none}
 
/* Move Buttons */
.moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.move-btn{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:all .15s;color:var(--text)}
.move-btn:hover:not(:disabled){border-color:var(--purple);background:var(--surface2);transform:translateY(-1px)}
.move-btn:active:not(:disabled){transform:translateY(0)}
.move-btn:disabled{opacity:.4;cursor:not-allowed}
.move-btn .move-name{font-weight:700;font-size:.85em;margin-bottom:4px}
.move-btn .move-desc{font-size:.6em;color:var(--dim);font-style:italic;line-height:1.3;margin-bottom:5px}
.move-btn .move-tags{display:flex;gap:3px;flex-wrap:wrap}
.move-btn .move-tags span{font-size:.58em;padding:1px 5px;border-radius:3px;font-weight:600}
.tag-stealth{background:rgba(170,102,255,.2);color:var(--purple)}.tag-speed{background:rgba(255,204,51,.2);color:var(--yellow)}.tag-sloppy{background:rgba(255,68,85,.2);color:var(--red)}.tag-projectile{background:rgba(68,136,255,.2);color:var(--blue)}
.tag-stat{background:var(--surface2);color:var(--dim)}
.move-shared{grid-column:1/-1}
 
/* Cooldown overlay */
.move-btn.on-cooldown{position:relative}
.move-btn.on-cooldown::after{content:attr(data-cd);position:absolute;top:4px;right:8px;font-size:.6em;color:var(--orange);font-weight:700}
 
/* Game Over */
.game-over{text-align:center;padding:24px;background:var(--surface);border:2px solid var(--border);border-radius:14px;margin:12px 0}
.game-over .trophy{font-size:3em;margin-bottom:8px}
.game-over h2{font-size:1.8em;font-weight:900;margin-bottom:6px}
.game-over .go-sub{color:var(--dim);font-size:.85em;margin-bottom:4px}
.game-over .go-stats{color:var(--dim);font-size:.72em;font-family:monospace;margin-bottom:16px}
.game-over .go-flavor{color:var(--purple);font-size:.75em;font-style:italic;margin-bottom:16px}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-weight:700;font-size:.9em;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--surface);transform:translateY(-1px)}
.btn-primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-primary:hover{background:#9955ee}
.btn-copy.copied{background:var(--green);border-color:var(--green);color:#000}
 
/* Event Banner */
.event-banner{background:linear-gradient(135deg,rgba(170,102,255,.1),rgba(255,68,85,.1));border:1px solid var(--purple);border-radius:10px;padding:10px 14px;margin:6px 0;animation:eventPop .4s ease}
@keyframes eventPop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.event-banner .event-name{color:var(--purple);font-weight:800;font-size:.85em}.event-banner .event-desc{color:var(--dim);font-size:.7em;font-style:italic;margin-top:3px}
 
/* Initiative Display */
.initiative{text-align:center;font-size:.65em;color:var(--dim);margin:2px 0;font-family:monospace}
.initiative .first{color:var(--cyan);font-weight:700}
 
/* Responsive */
@media(max-width:500px){.title h1{font-size:2em}.moves-grid{grid-template-columns:1fr}.char-grid{grid-template-columns:1fr}}
</style>
</head>

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function chance(pct) { return Math.random()*100 < pct; }
 
 
// ============================================================
// GAME ENGINE
// ============================================================
 
function createFighter(template) {
  return {
    ...template,
    maxHp: template.hp,
    tempDamage: 0, tempDef: 0, tempAcc: 0, tempEva: 0,
    statuses: [],
    cooldowns: template.moves.map(() => 0),
    totalDmgDealt: 0, totalDmgTaken: 0, movesUsed: 0, hits: 0, misses: 0,
  };
}
 
function getEffective(fighter, stat, chaos, clarity) {
  let val = fighter[stat];
  const mods = { damage:'tempDamage', defense:'tempDef', accuracy:'tempAcc', evasion:'tempEva' };
  if (mods[stat]) val += fighter[mods[stat]];
  // Apply status effects
  for (const s of fighter.statuses) {
    const def = STATUS_DEFS[s.id];
    if (def && def.statMod[stat]) val += def.statMod[stat];
  }
  return val;
}
 
function addStatus(fighter, statusId, turns) {
  if (!STATUS_DEFS[statusId]) return;
  // Don't stack same status, refresh duration
  const existing = fighter.statuses.find(s => s.id === statusId);
  if (existing) { existing.turns = Math.max(existing.turns, turns); return; }
  fighter.statuses.push({ id: statusId, turns });
}
 
function tickStatuses(fighter) {
  const log = [];
  const def_list = [];
  for (const s of fighter.statuses) {
    const def = STATUS_DEFS[s.id];
    if (def && def.dot > 0) {
      fighter.hp = Math.max(1, fighter.hp - def.dot);
      log.push({ text:`  ${def.emoji} ${fighter.name} takes ${def.dot} ${def.name} damage!`, type:'status' });
    }
    s.turns--;
    if (s.turns <= 0) {
      log.push({ text:`  ${def.emoji} ${fighter.name}'s ${def.name} wore off.`, type:'status' });
    }
  }
  fighter.statuses = fighter.statuses.filter(s => s.turns > 0);
  return log;
}
 
function applyPassive(fighter, chaos, clarity) {
  const n = fighter.name;
  if (n === 'Crack Fairy' && fighter.hp < fighter.maxHp * 0.4) fighter.tempEva += 10;
  if (n === 'Meth Wizard' && chaos > 60) fighter.tempDamage += 8;
  if (n === 'Coke Bard') clarity = Math.min(100, clarity + 5);
  if (n === 'Drunken Dwarf' && fighter.hp > fighter.maxHp * 0.6) fighter.tempDef += 3;
  if (n === 'Heroin Gnome' && fighter.hp < fighter.maxHp * 0.3) fighter.tempDef += 4;
  if (n === 'Ass Goblin') fighter.tempDamage += Math.floor(chaos / 10);
  return clarity;
}
 
function resolveTagInteraction(atkTags, defTags) {
  let best = null;
  for (const at of atkTags) {
    for (const dt of defTags) {
      const key = at + '|' + dt;
      if (TAG_MATRIX[key]) {
        if (!best || TAG_MATRIX[key].dmgMult > best.dmgMult) best = { ...TAG_MATRIX[key], atkTag: at, defTag: dt };
      }
    }
  }
  return best;
}
 
function resolveAttack(attacker, defender, move, chaos, clarity, isPlayer) {
  const log = [];
  const notes = [];
 
  // Effective stats
  const atkDmg = getEffective(attacker, 'damage', chaos, clarity);
  const atkAcc = getEffective(attacker, 'accuracy', chaos, clarity);
  const defDef = getEffective(defender, 'defense', chaos, clarity);
  const defEva = getEffective(defender, 'evasion', chaos, clarity);
 
  // Tag interaction with defender's last-used move tags (stored on fighter)
  const defTags = defender.lastMoveTags || [];
  const tagResult = resolveTagInteraction(move.tags, defTags);
  let dmgMult = 1.0, accBonus = 0;
  if (tagResult) {
    dmgMult = tagResult.dmgMult;
    accBonus = tagResult.accBonus;
    notes.push(tagResult.note);
  }
 
  // Chaos variance
  if (chaos > 30) {
    const variance = (chaos / 100) * 0.35;
    const roll = (Math.random() - 0.5) * 2 * variance;
    dmgMult += roll;
    if (roll > 0.12) notes.push('Chaos fuels extra damage!');
    if (roll < -0.12) notes.push('Chaos backfires!');
  }
 
  // Clarity bonus for player
  const clarityAcc = isPlayer ? clarity * 0.2 : (100 - clarity) * 0.1;
 
  // Final accuracy
  const finalAcc = clamp(move.accuracy + (atkAcc - 50) + accBonus + clarityAcc - chaos * 0.08, 5, 97);
  const finalEva = clamp(defEva, 0, 60);
 
  const hitRoll = Math.random() * 100;
  const evaRoll = Math.random() * 100;
  const hit = hitRoll < finalAcc && evaRoll >= finalEva;
 
  let totalDmg = 0;
  if (hit && move.damage > 0) {
    const base = move.damage + atkDmg;
    const reduced = Math.max(1, base - defDef);
    totalDmg = Math.max(1, Math.round(reduced * dmgMult));
 
    // Sloppy self-damage
    if (move.tags.includes('sloppy') && chance(12)) {
      const selfDmg = Math.round(move.damage * 0.15);
      attacker.hp = Math.max(1, attacker.hp - selfDmg);
      notes.push(`Took ${selfDmg} self-damage from being sloppy!`);
    }
 
    // Passive: Benzo Elf can't be confused
    if (defender.name === 'Benzo Elf' && move.statusApply === 'confused') {
      notes.push('Benzo Elf is too calm to be confused!');
    } else if (move.statusApply && hit) {
      addStatus(defender, move.statusApply, 2);
    }
 
    // Passive: Heroin Gnome damage reduction
    if (defender.name === 'Heroin Gnome' && defender.hp < defender.maxHp * 0.3) {
      totalDmg = Math.max(1, Math.round(totalDmg * 0.85));
      notes.push('Pain Immunity absorbs some damage!');
    }
 
    defender.hp = Math.max(0, defender.hp - totalDmg);
    attacker.totalDmgDealt += totalDmg;
    defender.totalDmgTaken += totalDmg;
    attacker.hits++;
  } else if (!hit) {
    attacker.misses++;
    // Apply status even on miss for some utility moves
    if (move.damage === 0 && move.statusApply) {
      if (defender.name === 'Benzo Elf' && move.statusApply === 'confused') {
        notes.push('Benzo Elf shrugs it off!');
      } else {
        addStatus(defender, move.statusApply, 2);
      }
    }
  }
 
  // Heal
  if (move.heal) {
    attacker.hp = Math.min(attacker.maxHp, attacker.hp + move.heal);
    notes.push(`Healed ${move.heal} HP!`);
  }
 
  attacker.movesUsed++;
  attacker.lastMoveTags = move.tags;
 
  return { hit, damage: totalDmg, notes, finalAcc: Math.round(finalAcc) };
}
 
function determineInitiative(player, enemy, chaos) {
  const pSpd = getEffective(player, 'speed', chaos, 50) + (Math.random() * 20 - 10);
  const eSpd = getEffective(enemy, 'speed', chaos, 50) + (Math.random() * 20 - 10);
  if (chaos > 70 && chance(25)) return chance(50); // Pure chaos randomizes
  return pSpd >= eSpd;
}

let STATE = {
  phase: 'select', // select | battle | gameover
  player: null,
  enemy: null,
  chaos: 10,
  clarity: 10,
  turn: 0,
  log: [],
  logId: 0,
  currentEvent: null,
  playerGoesFirst: true,
};
 
function resetState() {
  STATE = { phase:'select', player:null, enemy:null, chaos:10, clarity:10, turn:0, log:[], logId:0, currentEvent:null, playerGoesFirst:true };
}
 
function addLog(text, type) {
  STATE.log.push({ id: ++STATE.logId, text, type });
}
 
 
// ============================================================
// TURN EXECUTION
// ============================================================
 
function selectCharacter(charIndex) {
  const template = CHARACTERS[charIndex];
  const enemyPool = CHARACTERS.filter(c => c.name !== template.name);
  const enemyTemplate = pick(enemyPool);
 
  STATE.player = createFighter(template);
  STATE.enemy = createFighter(enemyTemplate);
  STATE.phase = 'battle';
  STATE.turn = 1;
  STATE.chaos = 10;
  STATE.clarity = 10;
  STATE.log = [];
  STATE.logId = 0;
 
  addLog(`${template.emoji} ${template.name} vs ${enemyTemplate.emoji} ${enemyTemplate.name}`, 'system');
  addLog(`"${template.description}"`, 'commentary');
  addLog(`vs.`, 'system');
  addLog(`"${enemyTemplate.description}"`, 'commentary');
  addLog(`────────── FIGHT! ──────────`, 'system');
 
  render();
}
 
function executeTurn(moveIndex) {
  if (STATE.phase !== 'battle') return;
  const p = STATE.player, e = STATE.enemy;
 
  // Reset temp stats each turn
  p.tempDamage=0; p.tempDef=0; p.tempAcc=0; p.tempEva=0;
  e.tempDamage=0; e.tempDef=0; e.tempAcc=0; e.tempEva=0;
 
  // Apply passives
  let newClarity = applyPassive(p, STATE.chaos, STATE.clarity);
  applyPassive(e, STATE.chaos, STATE.clarity);
  STATE.clarity = clamp(newClarity, 0, 100);
 
  const playerMove = p.moves[moveIndex];
  // AI picks move (weighted by chaos)
  const availableEnemyMoves = e.moves.map((m,i) => ({ m, i })).filter(x => e.cooldowns[x.i] <= 0);
  const aiChoice = availableEnemyMoves.length > 0 ? pick(availableEnemyMoves) : { m: e.moves[e.moves.length-1], i: e.moves.length-1 };
  const enemyMove = aiChoice.m;
 
  // Smart AI: prefer heal when low HP
  let finalAiChoice = aiChoice;
  if (e.hp < e.maxHp * 0.35) {
    const healMove = availableEnemyMoves.find(x => x.m.heal && x.m.heal > 0);
    if (healMove && chance(60)) finalAiChoice = healMove;
  }
  // Smart AI: prefer chaos moves when player clarity is high
  if (STATE.clarity > 65) {
    const chaosMove = availableEnemyMoves.find(x => x.m.chaos > 10);
    if (chaosMove && chance(50)) finalAiChoice = chaosMove;
  }
  const finalEnemyMove = finalAiChoice.m;
  const finalEnemyIdx = finalAiChoice.i;
 
  // Set cooldowns
  if (playerMove.cooldown > 0) p.cooldowns[moveIndex] = playerMove.cooldown + 1;
  if (finalEnemyMove.cooldown > 0) e.cooldowns[finalEnemyIdx] = finalEnemyMove.cooldown + 1;
 
  // Determine initiative
  const playerFirst = determineInitiative(p, e, STATE.chaos);
  STATE.playerGoesFirst = playerFirst;
 
  addLog(``, 'turn-sep');
  addLog(`══ Turn ${STATE.turn} ══${playerFirst ? '' : '  (' + e.name + ' acts first!)'}`, 'system');
 
  const first  = playerFirst ? { f:p, m:playerMove,      d:e, isP:true } : { f:e, m:finalEnemyMove, d:p, isP:false };
  const second = playerFirst ? { f:e, m:finalEnemyMove, d:p, isP:false } : { f:p, m:playerMove,      d:e, isP:true };
 
  // === FIRST ATTACKER ===
  executeAttack(first.f, first.d, first.m, first.isP);
  if (checkWinConditions()) { render(); return; }
 
  // === SECOND ATTACKER ===
  executeAttack(second.f, second.d, second.m, second.isP);
  if (checkWinConditions()) { render(); return; }
 
  // === TICK STATUSES ===
  const pStatusLog = tickStatuses(p);
  const eStatusLog = tickStatuses(e);
  for (const l of [...pStatusLog, ...eStatusLog]) addLog(l.text, l.type);
  if (checkWinConditions()) { render(); return; }
 
  // === RANDOM EVENT ===
  const eventChance = 15 + STATE.chaos * 0.45;
  if (chance(eventChance)) {
    const eligible = EVENTS.filter(ev => STATE.chaos >= ev.minChaos);
    if (eligible.length > 0) {
      const event = pick(eligible);
      addLog(`🎲 EVENT: ${event.name}`, 'event');
      addLog(`  "${event.desc}"`, 'event');
      event.effect(STATE);
      STATE.chaos = clamp(STATE.chaos + event.chaosD, 0, 100);
      STATE.clarity = clamp(STATE.clarity + event.clarityD, 0, 100);
    }
  }
 
  if (checkWinConditions()) { render(); return; }
 
  // === COMMENTARY ===
  if (chance(35)) addLog(`📢 ${pick(COMMENTARY.general)}`, 'commentary');
  if (p.hp < p.maxHp * 0.2 && chance(40)) addLog(`📢 ${pick(COMMENTARY.lowHp)}`, 'commentary');
  if (e.hp < e.maxHp * 0.2 && chance(40)) addLog(`📢 ${pick(COMMENTARY.lowHp)}`, 'commentary');
 
  // Tick cooldowns
  p.cooldowns = p.cooldowns.map(c => Math.max(0, c - 1));
  e.cooldowns = e.cooldowns.map(c => Math.max(0, c - 1));
 
  STATE.turn++;
  render();
}
 
function executeAttack(attacker, defender, move, isPlayer) {
  const label = isPlayer ? attacker.emoji : attacker.emoji;
  addLog(`${attacker.emoji} ${attacker.name} uses "${move.name}"`, 'move');
  addLog(`  ↳ ${move.desc}`, 'commentary');
 
  const result = resolveAttack(attacker, defender, move, STATE.chaos, STATE.clarity, isPlayer);
 
  if (result.hit && move.damage > 0) {
    addLog(`  💥 HIT! ${result.damage} damage to ${defender.name}! [${result.finalAcc}% acc]`, 'damage');
    if (result.damage > 25) addLog(`  ${pick(COMMENTARY.bigHit)}`, 'commentary');
  } else if (move.damage > 0) {
    addLog(`  💨 MISS! ${defender.name} evades. [${result.finalAcc}% acc]`, 'miss');
    if (result.finalAcc > 70) addLog(`  ${pick(COMMENTARY.bigMiss)}`, 'commentary');
  }
  if (move.heal) addLog(`  💚 ${attacker.name} heals ${move.heal} HP!`, 'heal');
 
  for (const n of result.notes) addLog(`  → ${n}`, 'status');
 
  // Update chaos/clarity
  STATE.chaos = clamp(STATE.chaos + move.chaos, 0, 100);
  STATE.clarity = clamp(STATE.clarity + (isPlayer ? move.clarity : -Math.abs(move.clarity) * 0.4), 0, 100);
}
 
function checkWinConditions() {
  const p = STATE.player, e = STATE.enemy;
  if (STATE.clarity >= 100) {
    addLog(``, 'turn-sep');
    addLog(`✨ ${pick(COMMENTARY.clarityWin)}`, 'system');
    addLog(`🏆 ${p.name} wins by CLARITY TRANSCENDENCE!`, 'system');
    STATE.phase = 'gameover';
    STATE.winner = 'player';
    STATE.winType = 'clarity';
    return true;
  }
  if (e.hp <= 0) {
    addLog(``, 'turn-sep');
    addLog(`${pick(COMMENTARY.victory)}`, 'system');
    addLog(`🏆 ${p.name} wins by KNOCKOUT!`, 'system');
    STATE.phase = 'gameover';
    STATE.winner = 'player';
    STATE.winType = 'knockout';
    return true;
  }
  if (p.hp <= 0) {
    addLog(``, 'turn-sep');
    addLog(`💀 ${p.name} has fallen!`, 'system');
    addLog(`☠️ ${e.name} wins. ${pick(COMMENTARY.victory)}`, 'system');
    STATE.phase = 'gameover';
    STATE.winner = 'enemy';
    STATE.winType = 'knockout';
    return true;
  }
  return false;
}
 
 
// ============================================================
// BATTLE LOG FORMATTER (for sharing)
// ============================================================
 
function formatShareableLog() {
  const p = STATE.player, e = STATE.enemy;
  const lines = [
    '╔═══════════════════════════════════════╗',
    '║  CLARITY CLASH: CHAOS ARENA           ║',
    '╚═══════════════════════════════════════╝',
    '',
    `${p.emoji} ${p.name} vs ${e.emoji} ${e.name}`,
    '',
  ];
  for (const entry of STATE.log) {
    if (entry.type !== 'turn-sep') lines.push(entry.text);
  }
  lines.push('');
  lines.push('─── FINAL STATS ───');
  lines.push(`${p.emoji} ${p.name}: ${p.hp}/${p.maxHp} HP | ${p.totalDmgDealt} dmg dealt | ${p.hits} hits / ${p.misses} misses`);
  lines.push(`${e.emoji} ${e.name}: ${e.hp}/${e.maxHp} HP | ${e.totalDmgDealt} dmg dealt | ${e.hits} hits / ${e.misses} misses`);
  lines.push(`Chaos: ${Math.round(STATE.chaos)} | Clarity: ${Math.round(STATE.clarity)} | Turns: ${STATE.turn}`);
  lines.push(`Win: ${STATE.winType === 'clarity' ? 'CLARITY TRANSCENDENCE' : 'KNOCKOUT'}`);
  lines.push('');
  if (STATE.winner === 'player') {
    lines.push(`🏆 ${p.name} is victorious!`);
  } else {
    lines.push(`☠️ ${e.name} claims victory!`);
  }
  lines.push('');
  lines.push('Play: Clarity Clash: Chaos Arena');
  return lines.join('\n');
}
 
function copyBattleLog() {
  const text = formatShareableLog();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    if (btn) { btn.textContent = '✅ Copied!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='📋 Copy Battle Log'; btn.classList.remove('copied'); }, 2000); }
  });
}

function renderStatusPills(fighter) {

    const def = STATUS_DEFS[s.id];
    if (!def) return '';
    const cls = def.type === 'buff' ? 'status-buff' : def.type === 'debuff' ? 'status-debuff' : 'status-neutral';
    return `<span class="status-pill ${cls}">${def.emoji} ${def.name} (${s.turns})</span>`;
  }).join('');
}
 
function chaosLabel(c) {
  if (c < 20) return 'Simmering';
  if (c < 40) return 'Unhinged';
  if (c < 60) return 'Volatile';
  if (c < 80) return 'Pure Bedlam';
  return 'MAXIMUM CHAOS';
}
function clarityLabel(c) {
  if (c < 20) return 'Foggy';
  if (c < 40) return 'Hazy';
  if (c < 60) return 'Clearing';
  if (c < 80) return 'Lucid';
  return 'TRANSCENDENCE';
}
 
function renderBattle() {
  const p = STATE.player, e = STATE.enemy;
  const pPct = Math.max(0, (p.hp / p.maxHp) * 100);
  const ePct = Math.max(0, (e.hp / e.maxHp) * 100);
  const isActive = STATE.phase === 'battle';
 
  let html = `
    <div class="battle-header">
      <h1>CLARITY CLASH</h1>
      <div class="turn-indicator">Turn ${STATE.turn}${STATE.turn > 1 ? (STATE.playerGoesFirst ? '' : ' | ' + e.emoji + ' went first') : ''}</div>
    </div>
 
    <!-- Enemy HP -->
    <div class="hp-section hp-bar-enemy">
      <div class="hp-header">
        <span class="hp-name">${e.emoji} ${e.name}</span>
        <span class="hp-numbers">${Math.max(0,e.hp)} / ${e.maxHp}</span>
      </div>
      <div class="hp-bar-outer"><div class="hp-bar-inner ${hpColor(ePct)}" style="width:${ePct}%"></div></div>
      <div class="status-effects">${renderStatusPills(e)}</div>
    </div>
 
    <!-- Meters -->
    <div class="meters">
      <div class="meter meter-chaos">
        <div class="meter-header"><span>🔥 CHAOS</span><span>${Math.round(STATE.chaos)}</span></div>
        <div class="meter-bar"><div class="meter-fill-chaos" style="width:${STATE.chaos}%"></div></div>
        <div class="meter-label">${chaosLabel(STATE.chaos)}</div>
      </div>
      <div class="meter meter-clarity">
        <div class="meter-header"><span>✨ CLARITY</span><span>${Math.round(STATE.clarity)}</span></div>
        <div class="meter-bar"><div class="meter-fill-clarity" style="width:${STATE.clarity}%"></div></div>
        <div class="meter-label">${clarityLabel(STATE.clarity)}</div>
      </div>
    </div>
 
    <!-- Battle Log -->
    <div class="log-container">
      ${STATE.log.map(e => `<div class="log-entry log-${e.type}">${e.text || '&nbsp;'}</div>`).join('')}
    </div>
 
    <!-- Player HP -->
    <div class="hp-section">
      <div class="hp-header">
        <span class="hp-name">${p.emoji} ${p.name} (YOU)</span>
        <span class="hp-numbers">${Math.max(0,p.hp)} / ${p.maxHp}</span>
      </div>
      <div class="hp-bar-outer"><div class="hp-bar-inner ${hpColor(pPct)}" style="width:${pPct}%"></div></div>
      <div class="status-effects">${renderStatusPills(p)}</div>
    </div>
  `;
 
  if (isActive) {
    html += `<div class="moves-grid">`;
    p.moves.forEach((m, i) => {
      const onCd = p.cooldowns[i] > 0;
      const isShared = i === p.moves.length - 1;
      const cdAttr = onCd ? `data-cd="${p.cooldowns[i]}T"` : '';
      html += `
        <button class="move-btn ${isShared ? 'move-shared' : ''} ${onCd ? 'on-cooldown' : ''}"
                onclick="executeTurn(${i})" ${onCd ? 'disabled' : ''} ${cdAttr}>
          <div class="move-name">${m.name}</div>
          <div class="move-desc">${m.desc}</div>
          <div class="move-tags">
            ${m.tags.map(t => `<span class="tag-${t}">${t}</span>`).join('')}
            ${m.damage > 0 ? `<span class="tag-stat">${m.damage} dmg</span>` : ''}
            ${m.accuracy < 100 ? `<span class="tag-stat">${m.accuracy}% acc</span>` : ''}
            ${m.heal ? `<span class="tag-stat" style="color:var(--green)">+${m.heal} hp</span>` : ''}
            ${m.cooldown > 0 ? `<span class="tag-stat" style="color:var(--orange)">${m.cooldown}T cd</span>` : ''}
            ${m.statusApply ? `<span class="tag-stat" style="color:var(--pink)">${STATUS_DEFS[m.statusApply]?.emoji||''} ${STATUS_DEFS[m.statusApply]?.name||''}</span>` : ''}
          </div>
        </button>
      `;
    });
    html += `</div>`;
  }
 
  if (STATE.phase === 'gameover') {
    const won = STATE.winner === 'player';
    const flavor = won
      ? [
          `${p.name} stands over the fallen ${e.name}. Dignity is not among the casualties. It was already dead.`,
          `Against all odds and common sense, ${p.name} prevails.`,
          `${e.name} has been defeated. ${p.name} barely qualifies as a winner.`,
        ]
      : [
          `${e.name} has ended your journey. It was ugly.`,
          `${p.name} lies defeated. The crowd disperses. Nobody makes eye contact.`,
          `${e.name} stands victorious. Nobody is proud of anyone.`,
        ];
 
    html += `
      <div class="game-over">
        <div class="trophy">${won ? '🏆' : '💀'}</div>
        <h2>${won ? 'YOU WIN!' : 'YOU DIED!'}</h2>
        <div class="go-sub">${STATE.winType === 'clarity' ? '✨ CLARITY TRANSCENDENCE ✨' : '💀 KNOCKOUT 💀'}</div>
        <div class="go-stats">
          ${p.emoji} ${p.name}: ${p.hp}/${p.maxHp} HP | ${p.totalDmgDealt} dmg | ${p.hits}/${p.hits+p.misses} hits<br>
          ${e.emoji} ${e.name}: ${e.hp}/${e.maxHp} HP | ${e.totalDmgDealt} dmg | ${e.hits}/${e.hits+e.misses} hits<br>
          Chaos: ${Math.round(STATE.chaos)} | Clarity: ${Math.round(STATE.clarity)} | Turns: ${STATE.turn}
        </div>
        <div class="go-flavor">"${pick(flavor)}"</div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="resetState();render()">⚔️ Play Again</button>
          <button class="btn btn-copy" onclick="copyBattleLog()">📋 Copy Battle Log</button>
        </div>
      </div>
    `;
  }
 
  return html;
}
 
// Initial render
render();
</script>
</body>
</html>
